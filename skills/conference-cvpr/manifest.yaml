name: conference-cvpr
# This is the skill-level internal/schema version. It does not need to match
# the GitHub Release version such as v1.5 or v1.5.1.
version: 1.5.0
description: >
  Declarative manifest for the CVPR Agent Skill router. SKILL.md uses this file
  to load the minimal core layer and then select workflow fragments for CVPR
  paper collection, normalization, export, completeness checking, and research
  metadata-level research analysis, and explicit selected-paper CVF PDF downloads.

always_load:
  - static/core/tools.md
  - static/core/routing-and-ops.md

axes:
  workflow:
    detect: |
      Map the user's need to one or more workflow values. Multiple workflows
      may apply for combined requests, such as "获取 CVPR 2026 论文并导出 Excel".
        collect-cvf          — collect CVPR main-conference papers from CVF Open Access
        normalize-metadata   — clean raw CVF records and write normalized metadata
        export-artifacts     — export normalized data to SQLite, Excel, Markdown, JSON
        completeness-check   — audit missing fields and duplicate titles
        research-analysis    — create metadata-level preliminary topic scans and conference reports
        download-cvf-pdf     — explicitly download selected CVF PDFs from local metadata
    values:
      collect-cvf: references/workflows/wf1-collect-cvf.md
      normalize-metadata: references/workflows/wf2-normalize-metadata.md
      export-artifacts: references/workflows/wf3-export-artifacts.md
      completeness-check: references/workflows/wf4-completeness-check.md
      research-analysis: references/workflows/wf5-research-analysis.md
      download-cvf-pdf: references/workflows/wf6-download-cvf-pdf.md
    multi: true

default_full_pipeline:
  - collect-cvf
  - normalize-metadata
  - export-artifacts
  - completeness-check

references:
  on_demand:
    - condition: normalized paper metadata schema and reserved enrichment fields
      path: ../_shared/core/metadata-schema.md
    - condition: deduplication during CVF day fallback or imported normalized data audit
      path: ../_shared/core/dedup-rules.md
    - condition: exact data, output, and analysis artifact paths
      path: ../_shared/core/output-contract.md
    - condition: SQLite table and export column contract
      path: ../_shared/core/database-schema.md
    - condition: research direction taxonomy for CVPR metadata analysis
      path: ../_shared/core/research-taxonomy.md
    - condition: conference-level report output
      path: ../_shared/templates/conference-report.md
    - condition: CVF Open Access HTML parsing details
      path: references/cvf-openaccess.md
    - condition: CVPR year URL and day-link patterns
      path: references/cvpr-year-patterns.md
    - condition: future OpenAlex enrichment planning only
      path: references/future-openalex-enrichment.md
    - condition: future code and project URL enrichment planning only
      path: references/future-code-link-enrichment.md

scope:
  includes:
    - CVPR main conference papers
    - metadata collection, normalization, export, and completeness reports
    - metadata-level preliminary research analysis
    - explicit selected-paper PDF downloads from CVF Open Access
  excludes:
    - CVPR workshops
    - automatic or full-conference PDF downloading
    - external enrichment APIs in v1
    - code repository download
    - OCR

scripts:
  collect: scripts/collect_cvpr.py
  normalize: scripts/normalize_cvpr.py
  export: scripts/export_cvpr.py
  check: scripts/check_completeness.py
  pipeline: scripts/run_pipeline.py
  download: scripts/download_cvf_pdf.py
